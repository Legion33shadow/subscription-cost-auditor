<script>

function exportPDF(){window.print()}
function shareReddit(txt){
  var t=encodeURIComponent(txt);
  var u=encodeURIComponent(window.location.href);
  window.open('https://www.reddit.com/submit?title='+t+'&url='+u,'_blank');
}
function shareTwitter(txt){
  var t=encodeURIComponent(txt+' '+window.location.href);
  window.open('https://twitter.com/intent/tweet?text='+t,'_blank');
}
function submitEmail(e,slug,result){
  e.preventDefault();
  var em=document.getElementById('cap_email').value;
  if(!em)return false;
  var fd=new FormData();
  fd.append('email',em);fd.append('source',slug);fd.append('result',result);
  fetch('https://formspree.io/f/xpwzpwzp',{
    method:'POST',body:fd,headers:{'Accept':'application/json'}
  }).then(function(){
    document.getElementById('cap_email').value='';
    var t=document.getElementById('cap_thanks');
    if(t)t.style.display='block';
  }).catch(function(){});
  return false;
}
function showAll(){
  var ids=['aff_box','journey_box','cap_box'];
  ids.forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.style.display='block';
  });
}


var subMo=0;
function getResult(){return subMo+'/mo';}
function addRow(){
  var c=document.getElementById('sub_list');
  var div=document.createElement('div');
  div.className='grid2';div.style.marginBottom='8px';
  div.innerHTML='<div class="field"><input type="text" placeholder="Service name" style="width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px"/></div>'
    +'<div class="field"><input type="number" placeholder="€/mo" style="width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px" oninput="run()"/></div>';
  c.appendChild(div);
}
function run(){
  var fixed=[
    parseFloat(document.getElementById('s1').value)||0,
    parseFloat(document.getElementById('s2').value)||0,
    parseFloat(document.getElementById('s3').value)||0,
    parseFloat(document.getElementById('s4').value)||0,
    parseFloat(document.getElementById('s5').value)||0,
    parseFloat(document.getElementById('s6').value)||0,
    parseFloat(document.getElementById('s7').value)||0,
    parseFloat(document.getElementById('s8').value)||0,
  ];
  var extra=0;
  var inputs=document.querySelectorAll('#sub_list input[type=number]');
  inputs.forEach(function(i){extra+=parseFloat(i.value)||0;});
  var total=fixed.reduce(function(a,b){return a+b;},0)+extra;
  subMo=Math.round(total);
  var yr=total*12;
  var f3=yr*3,f5=yr*5,f10=yr*10;
  var inv10=f10*Math.pow(1.07,10);
  document.getElementById('r_mo').textContent=total.toFixed(2)+'€/mo';
  document.getElementById('r_yr').textContent=yr.toFixed(0)+'€/yr';
  document.getElementById('r_day').textContent=(total/30).toFixed(2)+'€/day';
  document.getElementById('r_inv').textContent=inv10.toFixed(0)+'€ invested at 7%';
  document.getElementById('fut3').textContent=f3.toFixed(0)+'€';
  document.getElementById('fut5').textContent=f5.toFixed(0)+'€';
  document.getElementById('fut10').textContent=f10.toFixed(0)+'€';
  document.getElementById('future_box').style.display='block';
  var shock=document.getElementById('sub_shock');
  shock.style.display='block';
  if(total>300){shock.className='shock shock-red';}
  else if(total>150){shock.className='shock shock-orange';}
  else{shock.className='shock shock-green';}
  shock.innerHTML='<div class="shock-title">You burn '+total.toFixed(0)+
    '€ every month on subscriptions</div>'
    +'<div class="shock-sub">That's '+yr.toFixed(0)+'€/year — over 10 years at 7% = '+inv10.toFixed(0)+'€ lost</div>';
  document.getElementById('prescription').style.display='block';
  showAll();
}

window.onload=run;
</script>
